<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICASSP 2026 SingMOSPro 会议入口</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 450px; 
            width: 90%; 
            text-align: center; 
        }
        h1 { 
            color: #2c3e50; 
            font-size: 24px; 
            margin-top: 0;
            margin-bottom: 24px; 
        }
        .info-box { 
            background: #f8fafc; 
            border: 1px solid #e2e8f0;
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            text-align: left; 
        }
        .info-item { 
            margin-bottom: 15px; 
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-item strong { 
            display: block; 
            color: #64748b; 
            font-size: 13px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px; 
        }
        .info-item span { 
            font-size: 18px; 
            font-weight: 600; 
            color: #0f172a;
            font-family: monospace;
        }
        .join-btn { 
            display: block; 
            background-color: #2D8CFF; 
            color: white; 
            text-decoration: none; 
            padding: 14px 24px; 
            border-radius: 6px; 
            font-size: 16px;
            font-weight: bold; 
            transition: background 0.2s, transform 0.1s; 
        }
        .join-btn:hover { 
            background-color: #1a73e8; 
            transform: translateY(-1px);
        }
        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ICASSP 2026 SingMOSPro Virtual Room</h1>
        
        <div class="info-box">
            <div class="info-item">
                <strong>Meeting ID (会议号)</strong>
                <span>947 4893 0015</span>
            </div>
            <div class="info-item">
                <strong>Passcode (密码)</strong>
                <span>248874</span>
            </div>
        </div>

        <a href="https://cmu.zoom.us/j/94748930015?pwd=cjall9XqeXlMo6pvHaTDh1boekgNlg.1" class="join-btn" target="_blank">
            点击加入 Zoom 会议
        </a>

        <div class="footer-note">
            Hosted via CMU Zoom
        </div>
    </div>
</body>
</html>
